name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: CGO_ENABLED=0 go test ./internal/... -v -count=1

  build:
    name: Build Binary
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p dist
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          CGO_ENABLED=0 go build -ldflags="-X main.version=${VERSION}" -o dist/pler ./cmd/pler/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pler-linux-amd64
          path: dist/pler
          retention-days: 7
